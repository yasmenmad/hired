version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hired_postgres
    environment:
      POSTGRES_USER: hired_user
      POSTGRES_PASSWORD: hired_pass
      POSTGRES_DB: hired_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hired_user -d hired_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hired_backend
    environment:
      DATABASE_URL: postgresql://hired_user:hired_pass@postgres:5432/hired_db
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JSEARCH_API_KEY: ${JSEARCH_API_KEY}
      ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hired_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
